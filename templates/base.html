<!DOCTYPE html>
<html>
<head>
    <title>WoW AH Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        nav {
            background: #16213e;
            padding: 15px 20px;
            margin: -20px -20px 20px -20px;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover { color: #ffffff; }
        h1 { color: #00d4ff; }
        h2 { color: #a0a0c0; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }
        th {
            background: #16213e;
            color: #00d4ff;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #00d4ff;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #2a2a4a;
        }
        tr:hover { background: #1f1f3a; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }
        .neutral { color: #888; }
        .buy { color: #00ff88; font-weight: bold; }
        .watch { color: #ffaa00; }
        .avoid { color: #ff4444; }
        .stat-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }
        .stat-card h3 { margin: 0; color: #a0a0c0; font-size: 14px; }
        .stat-card .value { font-size: 28px; color: #00d4ff; margin-top: 5px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/flips">Flip Finder</a>
        <a href="/turnover">Turnover</a>
        <a href="/sales">Sale Rates</a>
        <a href="/opportunities">Opportunities</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
